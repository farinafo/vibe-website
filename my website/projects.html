<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的作品 | 个人网站</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, sans-serif; }
    body { background: linear-gradient(135deg, #4158D0, #743AE7); color:white; min-height:100vh; padding:120px 20px; }
    nav {
      position:fixed; top:0; width:100%; padding:20px 40px;
      background: rgba(0,0,0,0.15); backdrop-filter: blur(10px);
      display:flex; justify-content:space-between; align-items:center;
    }
    .logo { font-size:22px; font-weight:bold; }
    .nav-links { display:flex; gap:28px; }
    .nav-links a { color:white; text-decoration:none; font-weight:500; }
    .nav-links a:hover { color:#FFD700; }
    .container { max-width:1000px; margin:0 auto; }
    h1 { text-align:center; font-size:36px; margin-bottom:50px; color:#FFD700; }
    .cards { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap:30px; }
    .card { background:rgba(255,255,255,0.1); padding:30px; border-radius:16px; transition:0.3s; cursor:pointer; }
    .card:hover { transform:translateY(-6px); background:rgba(255,255,255,0.15); }
    .card h3 { margin-bottom:14px; font-size:22px; }
    .card p { opacity:0.9; line-height:1.6; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">MY SITE</div>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="about.html">关于我</a>
      <a href="projects.html">作品</a>
      <a href="contact.html">联系</a>
    </div>
  </nav>

  <div class="container">
    <h1>我的作品</h1>
    <div class="cards">
      <div class="card">
        <h3>个人网站</h3>
        <p>从零搭建的多页面响应式网站，包含动画与交互。</p>
      </div>
      <div class="card">
        <h3>设计作品</h3>
        <p>简约风格的视觉设计，追求干净、高级、易用。</p>
      </div>
      <div class="card">
        <h3>摄影作品集</h3>
        <p>用镜头记录生活、旅行与城市的光影瞬间。</p>
      </div>
    </div>
  </div>
</body>
</html>
