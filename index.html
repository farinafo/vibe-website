<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 | 我的个人网站</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, sans-serif; }
    body { background: linear-gradient(135deg, #4158D0, #743AE7); color:white; min-height:100vh; }
    nav {
      position:fixed; top:0; width:100%; padding:20px 40px;
      background: rgba(0,0,0,0.15); backdrop-filter: blur(10px);
      display:flex; justify-content:space-between; align-items:center;
    }
    .logo { font-size:22px; font-weight:bold; }
    .nav-links { display:flex; gap:28px; }
    .nav-links a { color:white; text-decoration:none; font-weight:500; transition:0.3s; }
    .nav-links a:hover { color:#FFD700; }
    .hero { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:0 20px; }
    .hero h1 { font-size:48px; margin-bottom:20px; animation: fadeIn 1s; }
    .hero p { font-size:20px; margin-bottom:40px; opacity:0.9; animation: fadeIn 1s 0.2s forwards; opacity:0; }
    .btn {
      padding:14px 36px; background:white; color:#743AE7; border:none; border-radius:50px;
      font-size:16px; font-weight:bold; cursor:pointer; transition:0.3s;
      animation: fadeIn 1s 0.4s forwards; opacity:0;
    }
    .btn:hover { transform:translateY(-4px); box-shadow:0 10px 20px rgba(0,0,0,0.2); }
    @keyframes fadeIn { to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <nav>
    <div class="logo">MY SITE</div>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="about.html">关于我</a>
      <a href="projects.html">作品</a>
      <a href="contact.html">联系</a>
    </div>
  </nav>

  <div class="hero">
    <h1>你好，我是网站创作者</h1>
    <p>这是我用代码搭建的完整多页面网站</p>
    <button class="btn" onclick="location.href='projects.html'">查看我的作品</button>
  </div>
</body>
</html>
