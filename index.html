<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>farinafo | 个人作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft Yahei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: #ffd700;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #ffd700;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* 英雄区 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards;
        }

        .hero p {
            font-size: 1.5em;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease 0.3s forwards;
        }

        .btn {
            padding: 15px 40px;
            background: #fff;
            color: #667eea;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease 0.6s forwards;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            background: #ffd700;
        }

        /* 卡片区 */
        .projects {
            padding: 100px 50px;
            background: rgba(255,255,255,0.05);
        }

        .section-title {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 60px;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: #ffd700;
            border-radius: 2px;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .project-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .project-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .project-card h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .project-card p {
            line-height: 1.6;
            opacity: 0.9;
        }

        /* 动画 */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            nav {
                padding: 15px 20px;
            }
            .nav-links {
                gap: 15px;
                font-size: 0.9em;
            }
            .hero h1 {
                font-size: 2.5em;
            }
            .hero p {
                font-size: 1.2em;
            }
            .projects {
                padding: 60px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="logo">farinafo</div>
        <div class="nav-links">
            <a href="#home">首页</a>
            <a href="#projects">项目</a>
            <a href="#about">关于</a>
            <a href="#contact">联系</a>
        </div>
    </nav>

    <!-- 英雄区 -->
    <section class="hero" id="home">
        <h1>你好，我是 farinafo 👋</h1>
        <p>摄影师 | 设计师 | 前端开发者</p>
        <button class="btn" onclick="scrollToProjects()">查看我的作品</button>
    </section>

    <!-- 项目区 -->
    <section class="projects" id="projects">
        <h2 class="section-title">我的项目</h2>
        <div class="project-grid">
            <div class="project-card">
                <h3>欧洲旅拍作品集</h3>
                <p>三年欧洲留学期间的摄影作品，记录城市风光与人文瞬间，用镜头定格美好。</p>
            </div>
            <div class="project-card">
                <h3>个人设计作品</h3>
                <p>UI/UX设计、品牌视觉设计案例，专注于简约高级的视觉风格与用户体验。</p>
            </div>
            <div class="project-card">
                <h3>AI 创作工具</h3>
                <p>用AI辅助创作，生成个性化人像、设计稿，探索科技与艺术的融合。</p>
            </div>
        </div>
    </section>

    <script>
        // 滚动到项目区的交互
        function scrollToProjects() {
            document.getElementById('projects').scrollIntoView({
                behavior: 'smooth'
            });
        }

        // 导航栏滚动效果
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.style.background = 'rgba(0,0,0,0.3)';
                nav.style.padding = '15px 50px';
            } else {
                nav.style.background = 'rgba(0,0,0,0.1)';
                nav.style.padding = '20px 50px';
            }
        });

        // 卡片点击交互
        const cards = document.querySelectorAll('.project-card');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                card.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    card.style.transform = 'translateY(-10px)';
                }, 150);
                alert('你点击了「' + card.querySelector('h3').textContent + '」项目！');
            });
        });
    </script>
</body>
</html>
